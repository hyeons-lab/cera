name: Publish npm (cera-wasm)

# Standalone npm publish for the cera-wasm package — independent of crates.io,
# CLI binaries, and Maven. Builds from source, so it does not require the crates
# to be on crates.io first.
#
#   dry_run = true  (default): `npm publish --dry-run` (no upload).
#   dry_run = false:           publishes @hyeons-lab/cera-wasm to npm.
#
# Required secret: NPM_TOKEN (npmjs automation token for the @hyeons-lab scope).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (npm publish --dry-run, no upload)'
        type: boolean
        required: true
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish-npm:
    name: Publish cera-wasm to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.14.0'

      - name: Install binaryen (provides wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Publish the `bundler` target as the canonical `@hyeons-lab/cera-wasm`
      # (the most common consumer shape). The `web` / `nodejs` shapes share the
      # same package name today; publishing them as distinct npm packages is a
      # follow-up (would require rewriting package.json.name per target).
      - name: Build cera-wasm npm package (bundler)
        run: |
          wasm-pack build cera-wasm \
            --target bundler \
            --release \
            --scope hyeons-lab \
            --out-dir pkg-bundler

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "=== DRY RUN: npm publish --dry-run ==="
            npm publish cera-wasm/pkg-bundler --access public --dry-run
          else
            npm publish cera-wasm/pkg-bundler --access public
          fi
