name: Benchmarks

# Regular, consistent CPU throughput logs for the LFM2 quants cera ships
# (Q4_0 / Q4_K_M / Q8_0), so perf regressions and wins are visible over time.
#
# Runs on:
#   - a nightly schedule (fixed-cadence baseline),
#   - every push to main that touches the compute kernels or model forward paths
#     (per-merge tracking — the "did this change move prefill/decode" signal),
#   - manual dispatch (with overridable prompt length / run count).
#
# Two runners: `ubuntu-24.04-arm` (Neoverse N2, FEAT_I8MM — where the aarch64
# SMMLA GEMM kernels actually execute, closest to the mobile target) and
# `ubuntu-latest` (x86_64 desktop baseline). Absolute tok/s on shared CI runners
# drifts; the durable signals are the resolved CPU tier (logged each run) and
# relative movement across commits for the same runner + quant. Results land in
# the job summary (a markdown table) and as a `bench-results.json` artifact in
# github-action-benchmark's customBiggerIsBetter format, ready for trend
# tracking / regression alerts to be layered on later.
#
# Each run also benchmarks upstream **llama.cpp** on the *same* GGUFs (pinned
# commit, built once and cached, native ISA to match cera's runtime dispatch) and
# adds `llama` + `gap (llama/cera)` columns to the summary table. This is
# best-effort context, not a gate: if the llama build or a model load fails, the
# comparison degrades to `n/a` and the cera measurement (the tracked JSON) is
# unaffected. The gap is the competitive signal the isolated cera numbers lack.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly
  workflow_dispatch:
    inputs:
      prompt_tokens:
        description: "Prefill length (tokens)"
        default: "512"
      runs:
        description: "Measured runs per quant"
        default: "10"
  push:
    branches: [main]
    paths:
      - "cera/src/backend/**"
      - "cera/src/model/**"
      - "cera/src/quant.rs"
      - "cera/src/tensor.rs"
      - "scripts/ci-bench.sh"
      - ".github/workflows/benchmarks.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Override .cargo/config.toml target-cpu=native — CI runners vary, and we want
  # the runtime-dispatched kernels (the shipped binaries' behavior), not a build
  # pinned to one runner's microarch.
  RUSTFLAGS: ""
  # Upstream llama.cpp pin for the head-to-head — a commit verified to support the
  # `lfm2` arch these bundles use. Single source of truth: both the build step and
  # both llama.cpp cache keys interpolate it, so bumping the pin (and `-v<n>`)
  # here re-keys the cache automatically — no separate SHA-prefix to keep in sync.
  LLAMA_COMMIT: fb38d6f278a4a391b8db1a16ee5946db3766459c

jobs:
  cpu-bench:
    name: CPU bench (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-i8mm
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-07-10
      - uses: Swatinem/rust-cache@v2
      - name: Build release CLI
        run: cargo build --release -p cera-cli
      # Restore/save split (not `actions/cache`) so the model cache is only saved
      # after a *successful* bench — a failed or partial download can't freeze a
      # corrupt ~/.cache/cera under the key and poison every future run. Keyed per
      # arch to avoid the two matrix jobs racing on one key.
      - name: Restore model bundles
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/cera
          key: bench-models-LFM2.5-350M-${{ matrix.arch }}-v1
      # Upstream llama.cpp for the head-to-head, pinned (`LLAMA_COMMIT`, top-level
      # env) + cached + built native so it runs the same ISA cera's runtime
      # dispatch picks. The whole thing is best-effort (`continue-on-error` on both
      # build and save): a failure leaves `LLAMA_BENCH` unset, so `ci-bench.sh`
      # runs cera-only and the job still passes. Both cache keys interpolate
      # `LLAMA_COMMIT`, so bumping the pin re-keys them automatically.
      - name: Restore llama.cpp build
        id: llama-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/llamacpp/build
          key: llamacpp-${{ env.LLAMA_COMMIT }}-${{ matrix.runner }}-v1
      - name: Build llama.cpp (llama-bench)
        id: llama
        continue-on-error: true
        run: |
          set -e
          BENCH="$HOME/llamacpp/build/bin/llama-bench"
          # Rebuild if the binary is missing OR a *cached* one can no longer run
          # (e.g. the runner image bumped glibc/libstdc++ under it) — `-h` exits 0
          # on a healthy binary and non-zero if it can't even load, so this
          # self-heals on an image change instead of serving a dead binary until
          # the cache key is bumped by hand.
          if [ ! -x "$BENCH" ] || ! "$BENCH" -h >/dev/null 2>&1; then
            rm -rf "$HOME/llamacpp"
            # Shallow single-commit fetch — pulls just the pinned tree, not the
            # full history (github.com allows fetching a specific SHA). Only runs
            # on a cache miss / self-heal, so the saving is a rare-path speedup.
            git init -q "$HOME/llamacpp"
            git -C "$HOME/llamacpp" fetch -q --depth 1 \
              https://github.com/ggml-org/llama.cpp.git "$LLAMA_COMMIT"
            git -C "$HOME/llamacpp" checkout -q FETCH_HEAD
            cmake -S "$HOME/llamacpp" -B "$HOME/llamacpp/build" \
              -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=ON \
              -DBUILD_SHARED_LIBS=OFF -DLLAMA_CURL=OFF \
              -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_SERVER=OFF
            cmake --build "$HOME/llamacpp/build" --target llama-bench -j"$(nproc)"
          fi
          echo "LLAMA_BENCH=$BENCH" >> "$GITHUB_ENV"
      # Save only on a fresh build (cache miss) — re-saving an existing key is a
      # `ReserveCacheError` warning at best. `continue-on-error` so a transient
      # cache-service failure never fails the (already-measured) benchmark job.
      - name: Save llama.cpp build
        if: steps.llama.outcome == 'success' && steps.llama-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: ~/llamacpp/build
          key: llamacpp-${{ env.LLAMA_COMMIT }}-${{ matrix.runner }}-v1
      - name: Run CPU benchmarks
        env:
          BIN: ./target/release/cera
          ARCH_LABEL: ${{ matrix.arch }}
          BUNDLE_ID: LFM2.5-350M
          QUANTS: "Q4_0 Q4_K_M Q8_0"
          PROMPT_TOKENS: ${{ github.event.inputs.prompt_tokens || '512' }}
          RUNS: ${{ github.event.inputs.runs || '10' }}
          WARMUP: "2"
          MAX_TOKENS: "32"
          # Thread count is left at each engine's *shipping default* — cera
          # auto-calibrates (and its decode pool's optimum is not always all-core,
          # so forcing a fixed count would measure something other than what ships),
          # and llama-bench uses its own default. The comparison is therefore
          # "cera as shipped vs llama as shipped". On a hyperthreaded runner the two
          # defaults can differ (cera counts logical cores, llama physical), so read
          # the gap as indicative, not a controlled micro-benchmark — consistent
          # with this job's stated "relative movement across commits" purpose.
          # (`LLAMA_THREADS` in ci-bench.sh can pin llama-bench if ever needed.)
        run: bash scripts/ci-bench.sh
      # Save only on success — a failed bench (e.g. total download outage) leaves
      # the cache untouched rather than persisting a partial ~/.cache/cera.
      - name: Save model bundles
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/cera
          key: bench-models-LFM2.5-350M-${{ matrix.arch }}-v1
      # `always()` so results (including the partial/empty JSON the script writes
      # before failing) upload even when the bench step fails — without it the
      # step defaults to `if: success()` and the `if-no-files-found: error` guard
      # can never fire.
      - name: Upload results JSON
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-results-${{ matrix.arch }}
          path: bench-results.json
          if-no-files-found: error
