name: Publish crates.io

# Standalone crates.io publish — independent of npm (publish-npm.yml), CLI
# binaries (publish-cli.yml), and Maven (publish-jvm.yml). Run this first to
# reserve the crate names.
#
#   dry_run = true  (default): packages every crate, no upload. Safe anytime.
#   dry_run = false:           publishes cera, cera-ffi, cera-cli, cera-wasm to
#                              crates.io in dependency order.
#
# Required secret: CARGO_REGISTRY_TOKEN (crates.io token, publish-new + publish-update).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (package only, no upload)'
        type: boolean
        required: true
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish-crates:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-02

      - uses: Swatinem/rust-cache@v2

      # Compile-verify the whole workspace with local path deps before any
      # packaging. The dry-run packaging below uses --no-verify for downstream
      # crates (their `cera` dep isn't on the index yet), so this is what
      # actually guarantees every crate still builds.
      - name: Verify workspace compiles
        run: cargo check --workspace

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Topological order: `cera` (no internal deps) first, then the three
          # crates that depend only on `cera`. `cera-parity` is publish=false
          # (internal cross-language parity harness) and is excluded.
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "=== DRY RUN: packaging only, no upload ==="
            cargo package -p cera
            # Downstream crates depend on `cera = "0.1.0"`, which is not on the
            # index during a dry run — point the dep back at the local path and
            # skip the verify build's registry resolution.
            for c in cera-ffi cera-cli cera-wasm; do
              echo "--- packaging $c ---"
              cargo package -p "$c" --no-verify \
                --config "patch.crates-io.cera.path='cera'"
            done
            echo "All crates packaged successfully (dry run)."
            exit 0
          fi

          echo "=== PUBLISHING TO crates.io ==="
          echo "Publishing cera..."
          cargo publish -p cera
          echo "Waiting for crates.io index propagation..."
          sleep 30

          # ffi / cli / wasm all depend only on `cera` (now on the index) and
          # not on each other, so a short courtesy sleep between them is enough.
          for c in cera-ffi cera-cli cera-wasm; do
            echo "Publishing $c..."
            cargo publish -p "$c"
            sleep 15
          done
          echo "All crates published successfully."
