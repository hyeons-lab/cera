name: cera_ffi_flutter
description: >-
  Flutter/Dart bindings for the Cera inference engine. Wraps the cera-ffi
  UniFFI surface (the same C ABI behind the Kotlin and Swift bindings) plus a
  platform-aware native-library loader.
version: 0.2.0
publish_to: none
repository: https://github.com/hyeons-lab/cera

environment:
  # NativeCallable.isolateLocal (used by the generated bindings) lands in 3.1;
  # 3.3 is the floor we validate against.
  sdk: ^3.3.0

dependencies:
  # dart:ffi helpers (Utf8, toNativeUtf8, calloc, …) the generated code uses.
  ffi: ^2.1.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
