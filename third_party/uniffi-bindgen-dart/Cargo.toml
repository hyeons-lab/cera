# Vendored from https://github.com/nchapman/uniffi-bindgen-dart @ v0.1.3
# (crate `ubdg_bindgen`, the `uniffi-bindgen-dart` binary), flattened to a
# standalone crate. Local modifications: callback-interface argument lowering
# + Option<primitive> support for streaming (see src/dart/callback.rs). These
# fixes are to be upstreamed; this vendored copy is the interim source.
#
# Its own `[workspace]` table keeps it OUT of the parent cera workspace so
# `cargo run --manifest-path …` builds it independently.
[workspace]

[package]
name = "uniffi-bindgen-dart"
description = "Dart bindings generator for UniFFI (vendored + patched for Cera)"
version = "0.1.3"
edition = "2021"
license = "MIT"
authors = ["Nick Chapman <nchapman@fastmail.com>"]
repository = "https://github.com/nchapman/uniffi-bindgen-dart"

[lib]
name = "uniffi_bindgen_dart"

[[bin]]
name = "uniffi-bindgen-dart"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.98"
camino = "1.1.9"
clap = { version = "4.5.32", features = ["derive"] }
serde = { version = "1.0.219", features = ["derive"] }
toml = "0.8.20"
uniffi_bindgen = "0.31.0"

[dev-dependencies]
tempfile = "3.19.0"
